name: 构建-python

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "私有源码仓库，格式 owner/repo"
        required: true
        type: string
      source_sha:
        description: "私有源码仓库中的提交 SHA"
        required: true
        type: string
      project_path:
        description: "项目路径，例如 projects/python/sample-python-pkg"
        required: true
        type: string
      project_name:
        description: "项目名，例如 sample-python-pkg"
        required: true
        type: string
      release_tag:
        description: "私有仓库中的 Release 标签"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.source_repo }}-${{ inputs.project_path }}-${{ inputs.source_sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: 检出私有源码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_sha }}
          token: ${{ secrets.PRIVATE_SOURCE_READ_TOKEN }}
          sparse-checkout: |
            ${{ inputs.project_path }}
            scripts/release/Upload-ToPrivateRelease.ps1
            scripts/common/Invoke-WithRetry.ps1

      - name: 加载项目构建配置
        id: cfg
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Set-StrictMode -Version Latest

          function Get-ConfigValue {
            param(
              [Parameter(Mandatory = $true)]
              [AllowNull()]
              [object]$Section,
              [Parameter(Mandatory = $true)]
              [string]$Name,
              [AllowNull()]
              [object]$DefaultValue
            )

            if ($null -eq $Section -or -not $Section.PSObject.Properties[$Name]) {
              return $DefaultValue
            }

            $value = $Section.$Name
            if ($null -eq $value) {
              return $DefaultValue
            }

            if ($value -is [string] -and [string]::IsNullOrWhiteSpace($value)) {
              return $DefaultValue
            }

            return $value
          }

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          $configPath = Join-Path $projectRoot "build.public.json"

          $pythonConfig = $null

          if (Test-Path -Path $configPath) {
            $raw = Get-Content -Path $configPath -Raw
            if (-not [string]::IsNullOrWhiteSpace($raw)) {
              $config = $raw | ConvertFrom-Json
              $pythonConfig = Get-ConfigValue -Section $config -Name "python" -DefaultValue $null
            }
          }

          $mode = [string](Get-ConfigValue -Section $pythonConfig -Name "mode" -DefaultValue "onefile")
          $outputFile = [string](Get-ConfigValue -Section $pythonConfig -Name "output_filename" -DefaultValue "${{ inputs.project_name }}.exe")
          $assetName = [string](Get-ConfigValue -Section $pythonConfig -Name "asset_name" -DefaultValue "${{ inputs.project_name }}-windows-x64.exe")
          $nuitkaVersion = [string](Get-ConfigValue -Section $pythonConfig -Name "nuitka_version" -DefaultValue "main")
          $windowsIconFromIco = [string](Get-ConfigValue -Section $pythonConfig -Name "windows_icon_from_ico" -DefaultValue "")
          $includeDataFiles = @((Get-ConfigValue -Section $pythonConfig -Name "include_data_files" -DefaultValue @())) -join "`n"
          $assumeYesForDownloads = ([bool](Get-ConfigValue -Section $pythonConfig -Name "assume_yes_for_downloads" -DefaultValue $true)).ToString().ToLowerInvariant()

          $delimiter = [guid]::NewGuid().Guid
          @(
            "mode=$mode"
            "output_file=$outputFile"
            "asset_name=$assetName"
            "nuitka_version=$nuitkaVersion"
            "windows_icon_from_ico=$windowsIconFromIco"
            "assume_yes_for_downloads=$assumeYesForDownloads"
            "include_data_files<<$delimiter"
            $includeDataFiles
            $delimiter
          ) | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            ${{ inputs.project_path }}/requirements.txt
            ${{ inputs.project_path }}/pyproject.toml

      - name: 安装项目依赖
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Set-StrictMode -Version Latest

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          Push-Location $projectRoot

          try {
            if (Test-Path -Path "requirements.txt") {
              python -m pip install -r requirements.txt
            }

            if (Test-Path -Path "pyproject.toml") {
              python -m pip install .
            }
          } finally {
            Pop-Location
          }

      - name: 使用 Nuitka Action 构建单文件可执行程序
        uses: Nuitka/Nuitka-Action@v1.4
        with:
          nuitka-version: ${{ steps.cfg.outputs.nuitka_version }}
          working-directory: ${{ inputs.project_path }}
          script-name: main.py
          mode: ${{ steps.cfg.outputs.mode }}
          output-file: ${{ steps.cfg.outputs.output_file }}
          windows-icon-from-ico: ${{ steps.cfg.outputs.windows_icon_from_ico }}
          include-data-files: ${{ steps.cfg.outputs.include_data_files }}
          assume-yes-for-downloads: ${{ steps.cfg.outputs.assume_yes_for_downloads }}

      - name: 定位 Nuitka 产物
        id: nuitka_build
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          $buildDir = Join-Path $projectRoot "build"
          if (-not (Test-Path -Path $buildDir)) {
            throw "Nuitka build directory not found: $buildDir"
          }

          $preferred = Join-Path $buildDir "${{ steps.cfg.outputs.output_file }}"
          if (Test-Path -Path $preferred) {
            $exe = Get-Item -Path $preferred
          } else {
            $exe = Get-ChildItem -Path $buildDir -Filter *.exe -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }

          if (-not $exe) {
            throw "No exe artifact found in: $buildDir"
          }

          "asset_path=$($exe.FullName)" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      - name: 上传 Nuitka 产物到私有 Release
        env:
          PRIVATE_RELEASE_TOKEN: ${{ secrets.PRIVATE_RELEASE_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          if (-not $env:PRIVATE_RELEASE_TOKEN) {
            throw "Missing secret: PRIVATE_RELEASE_TOKEN"
          }

          $repoParts = "${{ inputs.source_repo }}".Split("/")
          if ($repoParts.Count -ne 2) {
            throw "source_repo must be owner/repo"
          }

          ./scripts/release/Upload-ToPrivateRelease.ps1 `
            -Owner $repoParts[0] `
            -Repo $repoParts[1] `
            -Tag "${{ inputs.release_tag }}" `
            -AssetPath "${{ steps.nuitka_build.outputs.asset_path }}" `
            -AssetName "${{ steps.cfg.outputs.asset_name }}" `
            -Token $env:PRIVATE_RELEASE_TOKEN
