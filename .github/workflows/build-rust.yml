name: 构建-rust

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "私有源码仓库，格式 owner/repo"
        required: true
        type: string
      source_sha:
        description: "私有源码仓库中的提交 SHA"
        required: true
        type: string
      project_path:
        description: "项目路径，例如 projects/rust/NeighborLinker"
        required: true
        type: string
      project_name:
        description: "项目名，例如 NeighborLinker"
        required: true
        type: string
      release_tag:
        description: "私有仓库中的 Release 标签"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.source_repo }}-${{ inputs.project_path }}-${{ inputs.source_sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: 检出私有源码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_sha }}
          token: ${{ secrets.PRIVATE_SOURCE_READ_TOKEN }}
          sparse-checkout: |
            ${{ inputs.project_path }}
            scripts/release/Upload-ToPrivateRelease.ps1
            scripts/common/Invoke-WithRetry.ps1

      - name: 加载项目构建配置
        id: cfg
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          function Get-ConfigValue {
            param(
              [Parameter(Mandatory = $true)]
              [AllowNull()]
              [object]$Section,
              [Parameter(Mandatory = $true)]
              [string]$Name,
              [AllowNull()]
              [object]$DefaultValue
            )

            if ($null -eq $Section -or -not $Section.PSObject.Properties[$Name]) {
              return $DefaultValue
            }

            $value = $Section.$Name
            if ($null -eq $value) {
              return $DefaultValue
            }

            if ($value -is [string] -and [string]::IsNullOrWhiteSpace($value)) {
              return $DefaultValue
            }

            return $value
          }

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          $configPath = Join-Path $projectRoot "build.public.json"

          $binaryName = "${{ inputs.project_name }}"
          $assetName = "${{ inputs.project_name }}-windows-x64.zip"
          $cargoArgsJson = "[]"
          $artifactFilesJson = "[]"

          if (Test-Path -Path $configPath) {
            $raw = Get-Content -Path $configPath -Raw
            if (-not [string]::IsNullOrWhiteSpace($raw)) {
              $config = $raw | ConvertFrom-Json
              $rustConfig = Get-ConfigValue -Section $config -Name "rust" -DefaultValue $null
              $binaryName = [string](Get-ConfigValue -Section $rustConfig -Name "binary_name" -DefaultValue $binaryName)
              $assetName = [string](Get-ConfigValue -Section $rustConfig -Name "asset_name" -DefaultValue $assetName)
              $cargoArgsJson = @((Get-ConfigValue -Section $rustConfig -Name "cargo_args" -DefaultValue @())) | ConvertTo-Json -Compress
              $artifactFilesJson = @((Get-ConfigValue -Section $rustConfig -Name "artifact_files" -DefaultValue @())) | ConvertTo-Json -Compress
            }
          }

          @(
            "binary_name=$binaryName"
            "asset_name=$assetName"
            "cargo_args_json=$cargoArgsJson"
            "artifact_files_json=$artifactFilesJson"
          ) | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ inputs.project_path }} -> target

      - name: 构建 Rust 项目
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Set-StrictMode -Version Latest

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          $manifestPath = Join-Path $projectRoot "Cargo.toml"
          $cargoArgs = '${{ steps.cfg.outputs.cargo_args_json }}' | ConvertFrom-Json
          $args = @("build", "--release", "--manifest-path", "$manifestPath") + @($cargoArgs)
          & cargo @args

      - name: 打包构建产物
        id: package
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Set-StrictMode -Version Latest

          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.project_path }}"
          $manifestPath = Join-Path $projectRoot "Cargo.toml"
          $metadataJson = cargo metadata --format-version 1 --no-deps --manifest-path "$manifestPath"
          $metadata = $metadataJson | ConvertFrom-Json
          $releaseDir = Join-Path $metadata.target_directory "release"
          if (-not (Test-Path -Path $releaseDir)) {
            throw "Rust release directory not found: $releaseDir"
          }

          $preferredBinary = Join-Path $releaseDir "${{ steps.cfg.outputs.binary_name }}.exe"
          if (Test-Path -Path $preferredBinary) {
            $binaryPath = $preferredBinary
          } else {
            $candidate = Get-ChildItem -Path $releaseDir -Filter *.exe -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if (-not $candidate) {
              throw "No executable artifact found in: $releaseDir"
            }
            $binaryPath = $candidate.FullName
          }

          $stagingDir = Join-Path $env:RUNNER_TEMP "${{ inputs.project_name }}-staging"
          if (Test-Path -Path $stagingDir) {
            Remove-Item -Path $stagingDir -Recurse -Force
          }
          New-Item -Path $stagingDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path $binaryPath -Destination $stagingDir -Force

          $artifactFiles = '${{ steps.cfg.outputs.artifact_files_json }}' | ConvertFrom-Json
          foreach ($relative in @($artifactFiles)) {
            if ([string]::IsNullOrWhiteSpace($relative)) {
              continue
            }

            $sourcePath = Join-Path $projectRoot $relative
            if (-not (Test-Path -Path $sourcePath)) {
              Write-Warning "artifact file not found: $sourcePath"
              continue
            }

            $targetPath = Join-Path $stagingDir (Split-Path -Path $relative -Leaf)
            Copy-Item -Path $sourcePath -Destination $targetPath -Recurse -Force
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "${{ inputs.project_name }}-${{ inputs.source_sha }}-windows-x64.zip"
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $zipPath -Force
          "asset_path=$zipPath" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      - name: 上传产物到私有 Release
        env:
          PRIVATE_RELEASE_TOKEN: ${{ secrets.PRIVATE_RELEASE_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          if (-not $env:PRIVATE_RELEASE_TOKEN) {
            throw "Missing secret: PRIVATE_RELEASE_TOKEN"
          }

          $repoParts = "${{ inputs.source_repo }}".Split("/")
          if ($repoParts.Count -ne 2) {
            throw "source_repo must be owner/repo"
          }

          ./scripts/release/Upload-ToPrivateRelease.ps1 `
            -Owner $repoParts[0] `
            -Repo $repoParts[1] `
            -Tag "${{ inputs.release_tag }}" `
            -AssetPath "${{ steps.package.outputs.asset_path }}" `
            -AssetName "${{ steps.cfg.outputs.asset_name }}" `
            -Token $env:PRIVATE_RELEASE_TOKEN
